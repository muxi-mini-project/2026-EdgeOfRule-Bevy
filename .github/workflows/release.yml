name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            formats: appimage,deb
            artifact: linux
          - os: windows-latest
            formats: wix
            artifact: windows
          - os: macos-latest
            formats: dmg
            artifact: macos

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev libudev-dev

      - name: Install WiX (Windows)
        if: runner.os == 'Windows'
        run: choco install wixtoolset -y

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            edge_of_rule -> target

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          Push-Location edge_of_rule
          try {
            $toml = Get-Content -Raw Cargo.toml
            $match = [regex]::Match($toml, '^\s*version\s*=\s*"([^"]+)"', 'Multiline')
            if (-not $match.Success) { throw "version not found in Cargo.toml" }
            $version = $match.Groups[1].Value

            cargo build --release

            $config = @{
              name = "edge_of_rule"
              productName = "Edge of Rule"
              version = $version
              identifier = "com.edge-of-rule"
              description = "Edge of Rule"
              icons = @("assets/icon.png", "assets/icon.ico")
              outDir = "target/release"
              binariesDir = "target/release"
              binaries = @(@{ path = "edge_of_rule"; main = $true })
              resources = @(@{ src = "assets"; target = "assets" })
            }
            $configJson = $config | ConvertTo-Json -Compress -Depth 6
            cargo packager --formats wix -c $configJson
          } finally {
            Pop-Location
          }

      - name: Package (non-Windows)
        if: runner.os != 'Windows'
        run: cargo packager --release --manifest-path ./edge_of_rule/Cargo.toml --formats ${{ matrix.formats }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            edge_of_rule/target/release/*.AppImage
            edge_of_rule/target/release/*.deb
            edge_of_rule/target/release/*.msi
            edge_of_rule/target/release/*.dmg

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Read version from Cargo.toml
        id: version
        run: |
          version=$(python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path('edge_of_rule/Cargo.toml').read_text()
          match = re.search(r'(?m)^version\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit('version not found in Cargo.toml')
          print(match.group(1))
          PY
          )
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.msi
            dist/**/*.dmg
